name: Claude Code Security

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: write

jobs:
  claude-review:
    name: claude-review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 2

      - name: Run Claude Code security review
        id: claude_scan
        uses: anthropics/claude-code-security-review@main
        with:
          comment-pr: true
          upload-results: true
          claude-model: claude-sonnet-4-20250514
          run-every-commit: true
          claude-api-key: ${{ secrets.CLAUDE_API_KEY }}

      - name: Gate PR on HIGH/CRITICAL findings only
        if: always()
        shell: bash
        run: |
          RESULTS_FILE="claudecode-results.json"
          if [ -f claudecode/claudecode-results.json ]; then
            RESULTS_FILE="claudecode/claudecode-results.json"
          fi

          if [ ! -f "${RESULTS_FILE}" ]; then
            echo "::error::No Claude results file found (checked claudecode-results.json and claudecode/claudecode-results.json)."
            echo "::error::Raw findings count output: '${{ steps.claude_scan.outputs.findings-count }}'"
            exit 1
          fi

          COUNT=$(jq '[.findings[]? | (.severity // "" | ascii_upcase) | select(. == "HIGH" or . == "CRITICAL")] | length' "${RESULTS_FILE}")
          echo "Raw findings count from action output: ${{ steps.claude_scan.outputs.findings-count }}"
          echo "High/Critical findings: ${COUNT}"

          if [ "${COUNT}" -gt 0 ]; then
            echo "::error::Claude security scan detected ${COUNT} HIGH/CRITICAL vulnerabilities."
            jq '.findings[]? | select((.severity // "" | ascii_upcase) == "HIGH" or (.severity // "" | ascii_upcase) == "CRITICAL") | {severity, file, line, category, description}' "${RESULTS_FILE}"
            exit 1
          fi

          echo "No HIGH/CRITICAL Claude findings."
